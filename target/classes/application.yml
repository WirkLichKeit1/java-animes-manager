server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 horas

  storage:
    # Defina STORAGE_TYPE=cloudinary nas variáveis de ambiente para usar o Cloudinary.
    # Deixe em branco ou defina como "local" para armazenamento local (desenvolvimento).
    type: ${STORAGE_TYPE:local}

    local:
      base-path: ${STORAGE_LOCAL_PATH:/app/uploads}

    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}

  video:
    max-bitrate-kbps: 5000
    allowed-formats: mp4,mkv,avi,webm

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.animeapi: DEBUG
    org.springframework.security: INFO