server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/animedb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-anime-api-256-bits-long!!}
    expiration-ms: 86400000  # 24 hours

  storage:
    # Use 'local' for development, 's3' for production
    type: ${STORAGE_TYPE:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:./uploads}
    s3:
      bucket: ${S3_BUCKET:anime-videos}
      region: ${AWS_REGION:us-east-1}

  video:
    max-bitrate-kbps: 5000
    allowed-formats: mp4,mkv,avi,webm

logging:
  level:
    com.animeapi: DEBUG
    org.springframework.security: INFO